<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake: Minimal | 裘建平</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: #000;
            color: #aaa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        #game-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 分数面板 */
        #score-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .score-item {
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .score-value {
            font-size: 28px;
            font-weight: 300;
            color: #fff;
        }
        
        /* 游戏画布 */
        .canvas-wrapper {
            width: 100%;
            max-width: 400px;
            position: relative;
            margin: 0 auto;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 控制按钮 */
        #controls {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        #game-status {
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
            min-height: 20px;
            letter-spacing: 1px;
        }
        
        .button-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .game-btn {
            flex: 1;
            padding: 14px 0;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .game-btn:hover, .game-btn:active {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .game-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #startBtn {
            background-color: rgba(100, 255, 100, 0.2);
        }
        
        #restartBtn {
            background-color: rgba(255, 100, 100, 0.2);
        }
        
        /* 方向控制 - 移动端 */
        #direction-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }
        
        @media (max-width: 768px) {
            #direction-controls {
                display: flex;
            }
        }
        
        .dir-row {
            display: flex;
            gap: 10px;
        }
        
        .dir-btn {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .dir-btn:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        
        .center-spacer {
            width: 70px;
        }
        
        /* 游戏结束界面 */
        #game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        .overlay-content {
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s;
        }
        
        #game-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        #game-overlay.active .overlay-content {
            transform: translateY(0);
            opacity: 1;
        }
        
        .overlay-title {
            font-size: 36px;
            font-weight: 300;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .overlay-score {
            font-size: 72px;
            font-weight: 100;
            color: #fff;
            margin-bottom: 30px;
        }
        
        .overlay-btn {
            padding: 14px 40px;
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .overlay-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        /* 控制提示 */
        .hint {
            margin-top: 10px;
            font-size: 11px;
            opacity: 0.4;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 分数显示 -->
        <div id="score-panel">
            <div class="score-item">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">长度</div>
                <div class="score-value" id="length">1</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高分</div>
                <div class="score-value" id="high-score">0</div>
            </div>
        </div>
        
        <!-- 游戏画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <!-- 游戏控制 -->
        <div id="controls">
            <div id="game-status">点击"裘建平"或按空格键开始</div>
            <div class="button-row">
                <button class="game-btn" id="startBtn">开始游戏</button>
                <button class="game-btn" id="restartBtn" disabled>裘建平</button>
            </div>
        </div>
        
        <!-- 移动端方向控制 -->
        <div id="direction-controls">
            <div class="dir-row">
                <button class="dir-btn" id="upBtn">↑</button>
            </div>
            <div class="dir-row">
                <button class="dir-btn" id="leftBtn">←</button>
                <div class="center-spacer"></div>
                <button class="dir-btn" id="rightBtn">→</button>
            </div>
            <div class="dir-row">
                <button class="dir-btn" id="downBtn">↓</button>
            </div>
        </div>
        
        <div class="hint">也可使用键盘方向键或WASD控制</div>
    </div>
    
    <!-- 游戏结束界面 -->
    <div id="game-overlay">
        <div class="overlay-content">
            <div class="overlay-title">裘建平</div>
            <div class="overlay-score" id="final-score">0</div>
            <button class="overlay-btn" id="overlay-restart-btn">裘建平</button>
        </div>
    </div>

    <script>
        // ========== 游戏配置 ==========
        const GRID_SIZE = 20; // 网格大小（像素）
        const GRID_WIDTH = 20; // 网格列数
        const GRID_HEIGHT = 20; // 网格行数
        const INITIAL_SPEED = 150; // 初始速度（毫秒）
        
        // 颜色配置
        const COLORS = {
            background: '#000000',
            snake: '#E0E0E0',
            snakeHead: '#FFFFFF',
            food: '#FF5555',
            grid: 'rgba(80, 80, 80, 0.1)',
            text: '#FFFFFF'
        };
        
        // ========== 游戏状态 ==========
        let snake = []; // 蛇身体数组
        let food = { x: 0, y: 0 }; // 食物位置
        let direction = { x: 1, y: 0 }; // 当前移动方向
        let nextDirection = { x: 1, y: 0 }; // 下一个移动方向
        let score = 0; // 当前分数
        let highScore = 0; // 最高分
        let gameRunning = false; // 游戏是否运行中
        let gamePaused = false; // 游戏是否暂停
        let gameSpeed = INITIAL_SPEED; // 当前游戏速度
        let gameLoop = null; // 游戏循环引用
        
        // ========== DOM元素引用 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const lengthElement = document.getElementById('length');
        const highScoreElement = document.getElementById('high-score');
        const gameStatus = document.getElementById('game-status');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverlay = document.getElementById('game-overlay');
        const finalScoreElement = document.getElementById('final-score');
        const overlayRestartBtn = document.getElementById('overlay-restart-btn');
        
        // 方向按钮
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        
        // ========== 工具函数 ==========
        
        // 初始化画布
        function initCanvas() {
            const container = document.querySelector('.canvas-wrapper');
            const size = Math.min(container.clientWidth, 400);
            
            // 设置画布大小为网格的整数倍
            const gridCount = GRID_WIDTH;
            const pixelSize = Math.floor(size / gridCount) * gridCount;
            
            canvas.width = pixelSize;
            canvas.height = pixelSize;
            
            // 重新绘制游戏
            if (gameRunning) {
                draw();
            } else {
                drawInitialScreen();
            }
        }
        
        // 绘制初始屏幕
        function drawInitialScreen() {
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            drawGrid();
            
            // 绘制游戏标题
            const cellSize = canvas.width / GRID_WIDTH;
            ctx.fillStyle = COLORS.text;
            ctx.font = `bold ${cellSize * 1.5}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('裘建平', canvas.width / 2, canvas.height / 2 - cellSize);
            
            ctx.font = `${cellSize * 0.7}px sans-serif`;
            ctx.fillText('点击"开始游戏"', canvas.width / 2, canvas.height / 2 + cellSize);
        }
        
        // 绘制网格
        function drawGrid() {
            const cellSize = canvas.width / GRID_WIDTH;
            
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 0.5;
            
            // 绘制垂直线
            for (let x = 0; x <= GRID_WIDTH; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, canvas.height);
                ctx.stroke();
            }
            
            // 绘制水平线
            for (let y = 0; y <= GRID_HEIGHT; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(canvas.width, y * cellSize);
                ctx.stroke();
            }
        }
        
        // 绘制蛇
        function drawSnake() {
            const cellSize = canvas.width / GRID_WIDTH;
            
            // 绘制蛇身体
            ctx.fillStyle = COLORS.snake;
            snake.forEach((segment, index) => {
                const x = segment.x * cellSize;
                const y = segment.y * cellSize;
                
                // 绘制圆角矩形
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, cellSize - 2, cellSize - 2, 2);
                ctx.fill();
                
                // 蛇头
                if (index === 0) {
                    ctx.fillStyle = COLORS.snakeHead;
                    ctx.beginPath();
                    ctx.roundRect(x + 1, y + 1, cellSize - 2, cellSize - 2, 2);
                    ctx.fill();
                    ctx.fillStyle = COLORS.snake;
                }
            });
        }
        
        // 绘制食物
        function drawFood() {
            const cellSize = canvas.width / GRID_WIDTH;
            
            ctx.fillStyle = COLORS.food;
            ctx.beginPath();
            ctx.arc(
                food.x * cellSize + cellSize / 2,
                food.y * cellSize + cellSize / 2,
                cellSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物发光效果
            ctx.shadowColor = COLORS.food;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * cellSize + cellSize / 2,
                food.y * cellSize + cellSize / 2,
                cellSize / 4,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 绘制游戏
        function draw() {
            // 清除画布
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            drawGrid();
            
            // 绘制食物
            drawFood();
            
            // 绘制蛇
            drawSnake();
        }
        
        // 生成食物
        function generateFood() {
            const availableCells = [];
            
            // 找出所有空单元格
            for (let x = 0; x < GRID_WIDTH; x++) {
                for (let y = 0; y < GRID_HEIGHT; y++) {
                    let isOccupied = false;
                    
                    // 检查是否被蛇占据
                    for (const segment of snake) {
                        if (segment.x === x && segment.y === y) {
                            isOccupied = true;
                            break;
                        }
                    }
                    
                    if (!isOccupied) {
                        availableCells.push({ x, y });
                    }
                }
            }
            
            // 如果没有空单元格，返回false
            if (availableCells.length === 0) {
                return false;
            }
            
            // 随机选择一个空单元格
            const randomIndex = Math.floor(Math.random() * availableCells.length);
            food = availableCells[randomIndex];
            return true;
        }
        
        // 更新游戏状态
        function update() {
            // 更新方向
            direction = { ...nextDirection };
            
            // 计算新蛇头位置
            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;
            
            // 边界检查（穿墙）
            if (head.x < 0) head.x = GRID_WIDTH - 1;
            if (head.x >= GRID_WIDTH) head.x = 0;
            if (head.y < 0) head.y = GRID_HEIGHT - 1;
            if (head.y >= GRID_HEIGHT) head.y = 0;
            
            // 检查是否撞到自己
            for (const segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver();
                    return;
                }
            }
            
            // 添加新蛇头
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 增加分数
                score += 10;
                scoreElement.textContent = score;
                lengthElement.textContent = snake.length;
                
                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                
                // 尝试生成新食物
                if (!generateFood()) {
                    // 如果没有空单元格，游戏胜利
                    gameWin();
                    return;
                }
                
                // 每50分加速一次
                if (score % 50 === 0 && gameSpeed > 80) {
                    gameSpeed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameTick, gameSpeed);
                }
            } else {
                // 没吃到食物，移除蛇尾
                snake.pop();
            }
        }
        
        // 游戏主循环
        function gameTick() {
            if (gameRunning && !gamePaused) {
                update();
                draw();
            }
        }
        
        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            // 初始化蛇
            snake = [
                { x: Math.floor(GRID_WIDTH / 2), y: Math.floor(GRID_HEIGHT / 2) }
            ];
            
            // 初始化方向
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            
            // 重置分数和速度
            score = 0;
            gameSpeed = INITIAL_SPEED;
            
            // 更新UI
            scoreElement.textContent = '0';
            lengthElement.textContent = '1';
            gameStatus.textContent = '游戏进行中... 按空格键暂停';
            startBtn.disabled = true;
            restartBtn.disabled = false;
            
            // 生成食物
            generateFood();
            
            // 启动游戏
            gameRunning = true;
            gamePaused = false;
            
            // 清除之前的循环
            if (gameLoop) clearInterval(gameLoop);
            
            // 开始新循环
            gameLoop = setInterval(gameTick, gameSpeed);
            
            // 绘制初始状态
            draw();
        }
        
        // 暂停/继续游戏
        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            
            if (gamePaused) {
                gameStatus.textContent = '游戏暂停中... 按空格键继续';
                clearInterval(gameLoop);
            } else {
                gameStatus.textContent = '游戏进行中... 按空格键暂停';
                gameLoop = setInterval(gameTick, gameSpeed);
            }
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            // 显示游戏结束界面
            finalScoreElement.textContent = score;
            setTimeout(() => {
                gameOverlay.classList.add('active');
            }, 500);
            
            // 更新按钮状态
            startBtn.disabled = false;
            restartBtn.disabled = true;
            gameStatus.textContent = '游戏结束！点击"重新开始"再次挑战';
        }
        
        // 游戏胜利
        function gameWin() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            // 显示胜利界面
            finalScoreElement.textContent = score + ' (胜利!)';
            setTimeout(() => {
                gameOverlay.classList.add('active');
            }, 500);
            
            // 更新按钮状态
            startBtn.disabled = false;
            restartBtn.disabled = true;
            gameStatus.textContent = '恭喜胜利！点击"重新开始"再次挑战';
        }
        
        // 重新开始游戏
        function restartGame() {
            // 隐藏游戏结束界面
            gameOverlay.classList.remove('active');
            
            // 短暂延迟后开始新游戏
            setTimeout(startGame, 300);
        }
        
        // 处理键盘输入
        function handleKeyDown(e) {
            // 防止方向键滚动页面
            if ([32, 37, 38, 39, 40, 87, 83, 65, 68].includes(e.keyCode)) {
                e.preventDefault();
            }
            
            switch(e.key) {
                case ' ':
                case 'Spacebar':
                    if (!gameRunning) {
                        startGame();
                    } else {
                        togglePause();
                    }
                    break;
                    
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        // 处理触摸滑动
        function initTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }, { passive: false });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                const touchEndX = touch.clientX;
                const touchEndY = touch.clientY;
                
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                
                // 确定滑动方向
                if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        // 水平滑动
                        if (dx > 0 && direction.x === 0) nextDirection = { x: 1, y: 0 }; // 右滑
                        else if (dx < 0 && direction.x === 0) nextDirection = { x: -1, y: 0 }; // 左滑
                    } else {
                        // 垂直滑动
                        if (dy > 0 && direction.y === 0) nextDirection = { x: 0, y: 1 }; // 下滑
                        else if (dy < 0 && direction.y === 0) nextDirection = { x: 0, y: -1 }; // 上滑
                    }
                }
            }, { passive: false });
        }
        
        // 初始化游戏
        function initGame() {
            // 加载最高分
            const savedHighScore = localStorage.getItem('snakeHighScore');
            if (savedHighScore) {
                highScore = parseInt(savedHighScore);
                highScoreElement.textContent = highScore;
            }
            
            // 初始化画布
            initCanvas();
            
            // 事件监听
            window.addEventListener('resize', initCanvas);
            document.addEventListener('keydown', handleKeyDown);
            
            // 按钮事件
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', restartGame);
            overlayRestartBtn.addEventListener('click', restartGame);
            
            // 方向按钮事件
            upBtn.addEventListener('click', () => {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            });
            
            downBtn.addEventListener('click', () => {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            });
            
            leftBtn.addEventListener('click', () => {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            });
            
            rightBtn.addEventListener('click', () => {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            });
            
            // 触摸控制
            initTouchControls();
            
            // 绘制初始屏幕
            drawInitialScreen();
        }
        
        // 页面加载完成后初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
